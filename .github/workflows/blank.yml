name: ⚡ 极速部署OSS（最终完美版）
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 直接生成首页
      - name: 📄 创建 index.html
        run: echo '<h1>✅ 部署成功</h1>' > index.html

      # 官方一键安装ossutil
      - name: 📦 安装ossutil
        run: sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      # 🔑 正确配置OSS（修复Endpoint！！！）
      - name: 配置认证
        run: |
          ossutil config -e oss-cn-shenzhen.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            -L CH

      # 🚀 上传（修复强制下载，无任何冗余）
      - name: 上传文件
        run: ossutil cp index.html oss://vexrune-wike/ --acl public-read --force --meta "Content-Disposition:inline"
