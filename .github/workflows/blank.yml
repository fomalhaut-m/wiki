name: Deploy to OSS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test files
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
              <meta charset="UTF-8">
              <title>测试页面</title>
              <link rel="stylesheet" href="style.css">
          </head>
          <body>
              <h1>部署成功 - HTML 测试</h1>
              <p id="js-test">加载中...</p>
              <script src="app.js"></script>
          </body>
          </html>
          EOF

          cat > style.css << 'EOF'
          body {
              font-family: Arial, sans-serif;
              max-width: 800px;
              margin: 50px auto;
              padding: 20px;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              border-radius: 10px;
          }
          h1 { text-align: center; }
          #js-test {
              padding: 15px;
              background: rgba(255,255,255,0.2);
              border-radius: 5px;
              text-align: center;
          }
          EOF

                    cat > app.js << 'EOF'
          document.addEventListener('DOMContentLoaded', function() {
              document.getElementById('js-test').textContent = 'JavaScript loaded!';
          });
          EOF

      - name: Install ossutil
        run: sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure
        run: |
          ossutil config -e oss-cn-shenzhen.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            -L CH

      - name: Upload files
        run: |
          ossutil cp index.html oss://vexrune-wike/index.html --acl public-read --force
          ossutil cp style.css oss://vexrune-wike/style.css --acl public-read --force
          ossutil cp app.js oss://vexrune-wike/app.js --acl public-read --force

      - name: Set content types
        run: |
          ossutil set-meta oss://vexrune-wike/index.html "Content-Type:text/html; charset=utf-8"
          ossutil set-meta oss://vexrune-wike/style.css "Content-Type:text/css; charset=utf-8"
          ossutil set-meta oss://vexrune-wike/app.js "Content-Type:application/javascript; charset=utf-8"