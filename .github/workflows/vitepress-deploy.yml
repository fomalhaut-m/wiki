name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: |
          npm run build
          cp -r docs/.vitepress/dist site

      - name: Download ossutil
        run: |
          wget https://github.com/aliyun/ossutil/releases/download/v1.7.16/ossutil-v1.7.16-linux-amd64.zip -O ossutil.zip
          unzip ossutil.zip
          chmod +x ossutil-v1.7.16-linux-amd64/ossutil
          mv ossutil-v1.7.16-linux-amd64/ossutil /usr/local/bin/ossutil

      - name: Configure ossutil
        run: |
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH

      - name: Verify OSS permissions
        run: |
          echo "=== 检查 ossutil 配置 ==="
          cat ~/.ossutilconfig
          echo ""
          echo "=== 验证 Bucket 访问权限 ==="
          ossutil ls oss://vexrune-wike/ --limited-num 5 || { echo "权限验证失败"; exit 1; }
          echo ""
          echo "=== Bucket 信息 ==="
          ossutil stat oss://vexrune-wike/

      - name: Verify build output
        run: |
          echo "=== 构建输出目录 ==="
          ls -la site/
          echo ""
          echo "=== 文件列表 ==="
          find site/ -type f | head -20

      - name: Upload to OSS
        run: |
          ossutil cp -r site/ oss://vexrune-wike/ --include "*" -f

      - name: Set ACL for website
        run: |
          echo "Bucket ACL already set to public-read"