name: 🚀 Deploy to Aliyun OSS (官方一键安装版)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 安装MkDocs
        run: pip install mkdocs mkdocs-material

      - name: 🏗️ 构建静态网站
        run: mkdocs build

      # ===================== 你指定的 官方一键安装脚本（100%成功） =====================
      - name: 📁 官方一键安装 ossutil（最新稳定版）
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   阿里云官方一键安装 ossutil"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil --version  # 验证安装
      # ================================================================================

      - name: 🔑 配置OSS凭证
        run: |
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH

      - name: 🗑️ 清空OSS旧文件
        run: ossutil rm -r oss://vexrune-wike/ --include "*" -f

      # 🔥 核心修复：关闭强制下载，浏览器正常渲染网页
      - name: ☁️ 上传文件到OSS
        run: |
          ossutil cp -r site/ oss://vexrune-wike/ \
            --acl public-read \
            --force \
            --meta "Content-Disposition:inline"

      - name: ⚙️ HTML文件设置不缓存
        run: ossutil set-props oss://vexrune-wike/ --meta "Cache-Control:no-cache" --include "*.html" -r

      - name: ⚙️ 静态资源长缓存(1年)
        run: |
          ossutil set-props oss://vexrune-wike/ \
            --meta "Cache-Control:public, max-age=31536000" \
            --include "*.css,*.js,*.png,*.jpg,*.svg,*.woff,*.woff2" -r

      - name: ✅ 验证部署结果
        run: ossutil stat oss://vexrune-wike/index.html

      - name: 🔄 自动刷新CDN缓存
        run: |
          pip install aliyun-python-sdk-core aliyun-python-sdk-cdn
          aliyuncli configure set access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} region-id cn-shenzhen
          aliyuncli cdn RefreshObjectCaches --ObjectPath https://wiki.vexrune.top/ --ObjectType Directory

      - name: 🎉 部署成功
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   🎊 部署完成！网站正常访问！"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 访问地址：https://wiki.vexrune.top"
