name: 🚀 Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   安装 MkDocs 和 Material 主题"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install mkdocs mkdocs-simple-blog mkdocs-pdf

      - name: 🏗️ Build MkDocs
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建静态站点"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mkdocs build
          echo ""
          echo "✅ 构建完成!"

      - name: 📁 Download ossutil
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   下载 ossutil 工具"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          wget -q https://github.com/aliyun/ossutil/releases/download/v1.7.16/ossutil-v1.7.16-linux-amd64.zip -O ossutil.zip
          unzip -q ossutil.zip
          chmod +x ossutil-v1.7.16-linux-amd64/ossutil
          mv ossutil-v1.7.16-linux-amd64/ossutil /usr/local/bin/ossutil
          echo "✅ ossutil 已安装"

      - name: 🔑 Configure ossutil
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   配置 OSS 凭证"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH
          echo "✅ 凭证配置完成"

      - name: 🔍 Verify OSS permissions
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   验证 OSS 访问权限"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📋 Bucket 信息:"
          ossutil stat oss://vexrune-wike/
          echo ""
          echo "📂 最近的文件 (前 5 个):"
          ossutil ls oss://vexrune-wike/ --limited-num 5
          echo ""
          echo "✅ 权限验证通过"

      - name: 📊 Verify build output
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建产物统计"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          FILE_COUNT=$(find site/ -type f | wc -l)
          TOTAL_SIZE=$(du -sh site/ | cut -f1)
          echo "📁 文件数量: $FILE_COUNT"
          echo "💾 总大小: $TOTAL_SIZE"
          echo ""
          echo "📄 文件列表 (前 10 个):"
          find site/ -type f | head -10
          echo ""

      - name: 🗑️ Clean old files on OSS
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   清理 OSS 旧文件"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil rm -r oss://vexrune-wike/ --include "*" -f
          echo "✅ 清理完成"

      - name: ☁️ Upload to OSS
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   上传文件到 OSS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil cp -r site/ oss://vexrune-wike/ --include "*" -f
          echo ""
          echo "✅ 上传完成!"

      - name: 🎉 Deploy Summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   🎊 部署成功!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🌐 网站地址: https://wiki.vexrune.top"
          echo "🏠 主站地址: https://vexrune.top"
          echo "🐷 阿里云 oss 部署, 必须要有备案的域名, 否则不能当做网站打开"
          echo ""
          echo "📌 请注意: 阿里云 OSS 静态网站可能需要几分钟生效"
          echo ""
