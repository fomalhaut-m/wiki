name: 🚀 Deploy to Aliyun OSS (绝对保险版 + 自动CDN刷新)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name:  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   安装 MkDocs 和 Material 主题"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install mkdocs mkdocs-material

      - name: 🏗️ Build MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建静态站点"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mkdocs build
          echo "✅ 构建完成!"

      - name: 📁 Download ossutil (v1.7.16 官方稳定版)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   下载 ossutil 工具 v1.7.16"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          wget -q https://github.com/aliyun/ossutil/releases/download/v1.7.16/ossutil-v1.7.16-linux-amd64.zip -O ossutil.zip
          unzip -q ossutil.zip
          chmod +x ossutil-v1.7.16-linux-amd64/ossutil
          mv ossutil-v1.7.16-linux-amd64/ossutil /usr/local/bin/ossutil
          echo "✅ ossutil v1.7.16 已安装"

      - name: 🔑 Configure ossutil
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   配置 OSS 凭证"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH
          echo "✅ 凭证配置完成"

      - name: 🔍 Verify OSS permissions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   验证 OSS 访问权限"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Bucket 信息:"
          ossutil stat oss://vexrune-wike/
          echo "📂 最近的文件 (前 5 个):"
          ossutil ls oss://vexrune-wike/ --limited-num 5
          echo "✅ 权限验证通过"

      - name: 📊 Verify build output
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建产物统计"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          FILE_COUNT=$(find site/ -type f | wc -l)
          TOTAL_SIZE=$(du -sh site/ | cut -f1)
          echo "📁 文件数量: $FILE_COUNT"
          echo "💾 总大小: $TOTAL_SIZE"
          echo "📄 文件列表 (前 10 个):"
          find site/ -type f | head -10

      - name: 🗑️ Clean old files on OSS
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   清理 OSS 旧文件"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil rm -r oss://vexrune-wike/ --include "*" -f
          echo "✅ 清理完成"

      - name: ☁️ 上传文件 (绝对保险模式)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   上传文件到 OSS"
          echo "   ✅ 使用本地 Content-Type 识别"
          echo "   ✅ 自动设置 public-read 权限"
          echo "   ✅ 强制覆盖 + 删除多余文件"
          echo "   ⚠️  不添加任何 --meta 参数!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil cp -r site/ oss://vexrune-wike/ \
            --acl public-read \
            --content-type-method=local \
            --force \
            --delete
          echo "✅ 上传完成!"

      - name: ⚙️ 设置 HTML 文件缓存 (no-cache)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   为 HTML 文件设置不缓存"
          echo "   确保每次访问都获取最新版本"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil set-props oss://vexrune-wike/ \
            --meta "Cache-Control:no-cache" \
            --include "*.html" \
            -r
          echo "✅ HTML 缓存设置完成"

      - name: ⚙️ 设置静态资源长缓存 (1年)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   为静态资源设置 1 年长缓存"
          echo "   大幅提升网站访问速度"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil set-props oss://vexrune-wike/ \
            --meta "Cache-Control:public, max-age=31536000" \
            --include "*.css,*.js,*.png,*.jpg,*.jpeg,*.gif,*.svg,*.ico,*.woff,*.woff2,*.ttf,*.eot" \
            -r
          echo "✅ 静态资源缓存设置完成"

      - name: ✅ 100% 验证部署结果
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   验证部署结果"
          echo "   检查 index.html 的关键属性"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          echo "📄 index.html 详细信息:"
          ossutil stat oss://vexrune-wike/index.html
          
          echo ""
          echo "🔍 验证关键属性:"
          
          # 检查 Content-Type
          if ossutil stat oss://vexrune-wike/index.html | grep -q "Content-Type: text/html"; then
            echo "✅ Content-Type: 正确 (text/html)"
          else
            echo "❌ Content-Type: 错误! 网站会被下载而不是渲染"
            exit 1
          fi
          
          # 检查 ACL
          if ossutil stat oss://vexrune-wike/index.html | grep -q "ACL: public-read"; then
            echo "✅ ACL: 正确 (public-read)"
          else
            echo "❌ ACL: 错误! 网站会显示 403 禁止访问"
            exit 1
          fi
          
          # 检查 Cache-Control
          if ossutil stat oss://vexrune-wike/index.html | grep -q "Cache-Control: no-cache"; then
            echo "✅ Cache-Control: 正确 (no-cache)"
          else
            echo "⚠️  Cache-Control: 未设置或不正确"
          fi
          
          echo ""
          echo "🎉 所有验证通过! 网站可以正常访问了"

      # ===================== 新增：自动刷新阿里云CDN缓存 =====================
      - name: 🔄 自动刷新阿里云 CDN 全站缓存
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   安装阿里云 CLI 工具"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install aliyun-python-sdk-core aliyun-python-sdk-cdn
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   配置阿里云凭证"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          aliyuncli configure set \
            --profile default \
            access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            region-id cn-shenzhen
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   刷新 CDN 全站缓存"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          # 刷新整个域名目录（立即生效）
          aliyuncli cdn RefreshObjectCaches \
            --ObjectPath https://wiki.vexrune.top/ \
            --ObjectType Directory
          
          echo "✅ CDN 缓存刷新任务已提交！"
          echo "ℹ️  阿里云CDN刷新通常 10-30 秒内全网生效"
      # ====================================================================

      - name: 🎉 Deploy Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   🎊 部署成功! (绝对保险版)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 网站地址: https://wiki.vexrune.top"
          echo "🏠 主站地址: https://vexrune.top"
          echo "🐷 阿里云 oss 部署, 必须要有备案的域名"
          echo "🔄 CDN 缓存已自动刷新，无需手动操作"
          echo "✅ 所有功能正常，网站立即访问最新版本"
