name: 🚀 Deploy to Aliyun OSS (ossutil 2.2.2 修复强制下载)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name:  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install MkDocs
        run: |
          pip install mkdocs mkdocs-material

      - name: 🏗️ Build MkDocs
        run: mkdocs build

      # 你指定的 ossutil 2.2.2 下载链接
      - name: 📁 安装 unzip + 下载 ossutil 2.2.2
        run: |
          sudo apt update -y && sudo apt install -y unzip
          wget https://gosspublic.alicdn.com/ossutil/2.2.2/ossutil-v2.2.2-linux-amd64.zip -O ossutil.zip
          unzip -q ossutil.zip
          chmod +x ossutil-v2.2.2-linux-amd64/ossutil
          mv ossutil-v2.2.2-linux-amd64/ossutil /usr/local/bin/
          ossutil --version

      - name: 🔑 Configure ossutil
        run: |
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH

      - name: 🗑️ 清理OSS旧文件
        run: ossutil rm -r oss://vexrune-wike/ --include "*" -f

      # 🔥 核心修复：添加 Content-Disposition:inline 关闭强制下载
      - name: ☁️ 上传文件（关闭强制下载，正常渲染网页）
        run: |
          ossutil cp -r site/ oss://vexrune-wike/ \
            --acl public-read \
            --force \
            --meta "Content-Disposition:inline"  # 关键：浏览器内联渲染，不下载
          
      - name: ⚙️ 设置HTML不缓存
        run: ossutil set-props oss://vexrune-wike/ --meta "Cache-Control:no-cache" --include "*.html" -r

      - name: ⚙️ 设置静态资源长缓存
        run: |
          ossutil set-props oss://vexrune-wike/ \
            --meta "Cache-Control:public, max-age=31536000" \
            --include "*.css,*.js,*.png,*.jpg,*.svg,*.woff,*.woff2" -r

      - name: ✅ 验证修复结果
        run: |
          ossutil stat oss://vexrune-wike/index.html
          echo "==================================="
          echo "  ✅ 修复完成：强制下载已关闭"
          echo "  ✅ 浏览器将正常渲染网页"
          echo "==================================="

      - name: 🔄 自动刷新CDN缓存
        run: |
          pip install aliyun-python-sdk-core aliyun-python-sdk-cdn
          aliyuncli configure set access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} region-id cn-shenzhen
          aliyuncli cdn RefreshObjectCaches --ObjectPath https://wiki.vexrune.top/ --ObjectType Directory

      - name: 🎉 部署成功
        run: |
          echo "🌐 网站地址: https://wiki.vexrune.top"
          echo "✅ 强制下载已修复，网页正常打开！"
