name: 🚀 Deploy to Aliyun OSS 

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 安装MkDocs
        run: pip install mkdocs mkdocs-material

      - name: 🏗️ 构建静态网站
        run: mkdocs build

      # ✅ 你指定的 阿里云官方一键安装脚本
      - name: 📁 官方一键安装 ossutil
        run: |
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          ossutil --version

      - name: 🔑 配置OSS凭证
        run: |
          ossutil config -e oss-cn-shenzhen.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            -L CH

      - name: 🗑️ 清空OSS旧文件
        run: ossutil rm -r oss://vexrune-wike/ --include "*" -f

      # ☁️ 上传文件
      - name: ☁️ 上传文件
        run: |
          ossutil cp site/ oss://vexrune-wike/ -r -f --acl public-read
      # 🔥 设置文件类型
      - name: 设置文件类型
        run: |
          find site/ -type f -name "*.html" | while read file; do
            target="${file#site/}"
            ossutil set-meta oss://vexrune-wike/"$target" "Content-Type:text/html; charset=utf-8" -f
          done
          find site/ -type f -name "*.css" | while read file; do
            target="${file#site/}"
            ossutil set-meta oss://vexrune-wike/"$target" "Content-Type:text/css; charset=utf-8" -f
          done
          find site/ -type f -name "*.js" | while read file; do
            target="${file#site/}"
            ossutil set-meta oss://vexrune-wike/"$target" "Content-Type:application/javascript; charset=utf-8" -f
          done

      - name: 🎉 部署成功
        run: echo "✅ 网站正常访问：https://wiki.vexrune.top"
