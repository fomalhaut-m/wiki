name: 🚀 Deploy to Aliyun OSS (终极稳定版)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name:  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   安装 MkDocs 和 Material 主题"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install mkdocs mkdocs-material

      - name: 🏗️ Build MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建静态站点"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mkdocs build
          echo "✅ 构建完成!"

      # ✅ 【阿里云国内官方镜像】100%下载成功，无报错
      - name: 📁 Download ossutil 1.7.20 (官方最新稳定版)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   下载 ossutil 工具(国内镜像,极速下载)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.20/ossutil64 -O /usr/local/bin/ossutil
          chmod +x /usr/local/bin/ossutil
          ossutil --version
          echo "✅ ossutil 安装完成"

      - name: 🔑 Configure ossutil
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   配置 OSS 凭证"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH
          echo "✅ 凭证配置完成"

      - name: 🗑️ Clean old files on OSS
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   清理 OSS 旧文件"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil rm -r oss://vexrune-wike/ --include "*" -f
          echo "✅ 清理完成"

      # ✅ 官方标准上传命令：自动识别Content-Type，无任何错误参数
      - name: ☁️ 上传文件到 OSS
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   上传文件(自动识别Content-Type)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil cp -r site/ oss://vexrune-wike/ --acl public-read --force
          echo "✅ 上传完成!"

      - name: ⚙️ 设置 HTML 不缓存
        run: |
          ossutil set-props oss://vexrune-wike/ --meta "Cache-Control:no-cache" --include "*.html" -r
          echo "✅ HTML 缓存设置完成"

      - name: ⚙️ 设置静态资源长缓存
        run: |
          ossutil set-props oss://vexrune-wike/ --meta "Cache-Control:public, max-age=31536000" --include "*.css,*.js,*.png,*.jpg,*.svg,*.woff,*.woff2" -r
          echo "✅ 静态资源缓存设置完成"

      - name: ✅ 验证部署结果
        run: |
          ossutil stat oss://vexrune-wike/index.html
          ossutil stat oss://vexrune-wike/index.html | grep "Content-Type: text/html" && echo "✅ Content-Type 正确"
          ossutil stat oss://vexrune-wike/index.html | grep "ACL: public-read" && echo "✅ 权限正确"

      # ✅ 自动刷新 CDN 缓存
      - name: 🔄 刷新阿里云 CDN
        run: |
          pip install aliyun-python-sdk-core aliyun-python-sdk-cdn
          aliyuncli configure set access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} region-id cn-shenzhen
          aliyuncli cdn RefreshObjectCaches --ObjectPath https://wiki.vexrune.top/ --ObjectType Directory
          echo "✅ CDN 刷新完成"

      - name: 🎉 部署成功
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   🎊 部署成功!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 网站地址: https://wiki.vexrune.top"
