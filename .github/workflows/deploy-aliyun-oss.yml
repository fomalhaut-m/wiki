name: 🚀 Deploy to Aliyun OSS (最终完美版)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name:  Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Install MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   安装 MkDocs 和 Material 主题"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install mkdocs mkdocs-material

      - name: 🏗️ Build MkDocs
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建静态站点"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          mkdocs build
          echo "✅ 构建完成!"

      # 🔥 升级为 ossutil 1.7.18 (支持 --content-type-method=local 参数)
      - name: 📁 Download ossutil (v1.7.18 官方版)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   下载 ossutil 工具 v1.7.18"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          wget -q https://github.com/aliyun/ossutil/releases/download/v1.7.18/ossutil-v1.7.18-linux-amd64.zip -O ossutil.zip
          unzip -q ossutil.zip
          chmod +x ossutil-v1.7.18-linux-amd64/ossutil
          mv ossutil-v1.7.18-linux-amd64/ossutil /usr/local/bin/ossutil
          echo "✅ ossutil v1.7.18 已安装"

      - name: 🔑 Configure ossutil
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   配置 OSS 凭证"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil config -e oss-cn-shenzhen.aliyuncs.com -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH
          echo "✅ 凭证配置完成"

      - name: 🔍 Verify OSS permissions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   验证 OSS 访问权限"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Bucket 信息:"
          ossutil stat oss://vexrune-wike/
          echo "📂 最近的文件 (前 5 个):"
          ossutil ls oss://vexrune-wike/ --limited-num 5
          echo "✅ 权限验证通过"

      - name: 📊 Verify build output
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   构建产物统计"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          FILE_COUNT=$(find site/ -type f | wc -l)
          TOTAL_SIZE=$(du -sh site/ | cut -f1)
          echo "📁 文件数量: $FILE_COUNT"
          echo "💾 总大小: $TOTAL_SIZE"
          echo "📄 文件列表 (前 10 个):"
          find site/ -type f | head -10

      - name: 🗑️ Clean old files on OSS
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   清理 OSS 旧文件"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil rm -r oss://vexrune-wike/ --include "*" -f
          echo "✅ 清理完成"

      # ✅ 1.7.18 专属参数，完美支持 --content-type-method=local
      - name: ☁️ 上传文件 (绝对保险模式)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   上传文件到 OSS"
          echo "   ✅ 使用本地 Content-Type 识别"
          echo "   ✅ 自动设置 public-read 权限"
          echo "   ✅ 强制覆盖 + 删除多余文件"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil cp -r site/ oss://vexrune-wike/ \
            --acl public-read \
            --content-type-method=local \
            --force \
            --delete
          echo "✅ 上传完成!"

      - name: ⚙️ 设置 HTML 文件缓存 (no-cache)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   为 HTML 文件设置不缓存"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil set-props oss://vexrune-wike/ \
            --meta "Cache-Control:no-cache" \
            --include "*.html" \
            -r
          echo "✅ HTML 缓存设置完成"

      - name: ⚙️ 设置静态资源长缓存 (1年)
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   为静态资源设置 1 年长缓存"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil set-props oss://vexrune-wike/ \
            --meta "Cache-Control:public, max-age=31536000" \
            --include "*.css,*.js,*.png,*.jpg,*.jpeg,*.gif,*.svg,*.ico,*.woff,*.woff2" \
            -r
          echo "✅ 静态资源缓存设置完成"

      - name: ✅ 100% 验证部署结果
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   验证部署结果"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ossutil stat oss://vexrune-wike/index.html
          
          # 自动校验关键属性
          ossutil stat oss://vexrune-wike/index.html | grep "Content-Type: text/html" && echo "✅ Content-Type 正确" || exit 1
          ossutil stat oss://vexrune-wike/index.html | grep "ACL: public-read" && echo "✅ 权限正确" || exit 1
          echo "🎉 部署验证全部通过！"

      # 🔄 自动刷新阿里云 CDN 缓存
      - name: 🔄 自动刷新阿里云 CDN 全站缓存
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   安装阿里云 CLI 并刷新 CDN"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          pip install aliyun-python-sdk-core aliyun-python-sdk-cdn
          aliyuncli configure set --profile default access-key-id ${{ secrets.ALIYUN_ACCESS_KEY_ID }} access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} region-id cn-shenzhen
          aliyuncli cdn RefreshObjectCaches --ObjectPath https://wiki.vexrune.top/ --ObjectType Directory
          echo "✅ CDN 缓存刷新成功！"

      - name: 🎉 Deploy Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   🎊 部署成功!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 网站地址: https://wiki.vexrune.top"
          echo "🏠 主站地址: https://vexrune.top"
          echo "✅ ossutil v1.7.18 | 参数正常 | CDN已刷新"
