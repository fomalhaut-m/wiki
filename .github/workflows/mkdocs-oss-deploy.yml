name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material

      - name: Build MkDocs
        run: |
          mkdocs build --config-file mkdocs.yml --site-dir site

      - name: Download ossutil
        run: |
          wget https://github.com/aliyun/ossutil/releases/download/v1.7.16/ossutil-v1.7.16-linux-amd64.zip -O ossutil.zip
          unzip ossutil.zip
          chmod +x ossutil-v1.7.16-linux-amd64/ossutil
          mv ossutil-v1.7.16-linux-amd64/ossutil /usr/local/bin/ossutil

      - name: Configure ossutil
        run: |
          ossutil config -e vexrune-wike.cn-shenzhen.taihangpfm.cn -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -L CH

      - name: Upload to OSS
        run: |
          ossutil cp -r site/ oss://vexrune-wike/ --include "*" -f

      - name: Set ACL for website
        run: |
          ossutil set-acl oss://vexrune-wike/ public-read
