services:
  master:
    image: mongo:5.0.13
    container_name: mongo_rs1  # 使用更明确的命名
    hostname: mongo_rs1        # 与容器名一致
    restart: unless-stopped    # 更灵活的重启策略
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db     # 标准化数据目录
    command: mongod --replSet rs --bind_ip_all  # 关键修正：允许所有IP连接
    healthcheck:               # 添加健康检查
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    name: mongo_network
    driver: bridge