site_name: Luke's Wiki
site_description: 个人知识沉淀与技术笔记
site_url: https://wiki.vexrune.top

theme:
  favicon: assets/favicon.png
  name: simple-blog
  language: zh
  header:
    title: VexRune Wiki
  logo: assets/logo.png
  site_title: wiki.vexrune.top
  features:
    # 导航功能
    - navigation.tabs           # 顶部标签页
    - navigation.tabs.sticky    # 固定标签页
    - navigation.sections       # 导航分组
    - navigation.expand         # 展开所有导航
    - navigation.top            # 回到顶部按钮
    - navigation.instant        # 即时加载页面
    - navigation.tracking       # 地址栏追踪锚点
    - navigation.indexes        # 分组主页
    # 搜索功能
    - search.highlight          # 搜索高亮
    - search.share              # 搜索分享
    - search.suggest           # 搜索建议
    # 内容功能
    - content.tabs.link         # 内容标签页链接
    - content.code.copy         # 代码复制按钮
    - content.code.annotate     # 代码注释
    - content.action.edit       # 编辑此页
    - content.action.view       # 查看源码
    # 头部功能
    - header.autohide           # 滚动时自动隐藏头部
    # 表格功能
    - content.table             # 表格排序

  # palette:
  #   # 深色模式 - 黑灰色调
  #   - media: "(prefers-color-scheme: dark)"
  #     scheme: slate
  #     primary: black
  #     accent: grey
  #     toggle:
  #       icon: material/brightness-4
  #       name: 切换至浅色模式
  #   # 浅色模式
  #   - media: "(prefers-color-scheme: light)"
  #     scheme: default
  #     primary: deep-purple
  #     accent: purple
  #     toggle:
  #       icon: material/brightness-7
  #       name: 切换至深色模式

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    favicon: assets/favicon.svg

strict: false

docs_dir: ./docs

site_dir: ./site

markdown_extensions:
  # 基础扩展
  - abbr                    # 缩写
  - admonition             # 警告框
  - attr_list              # 属性列表
  - def_list               # 定义列表
  - footnotes              # 脚注
  - md_in_html             # HTML中的Markdown
  - tables                 # 表格
  - toc:
      permalink: true
      toc_depth: 3
  - meta                   # 元数据

  # PyMdown 扩展
  - pymdownx.betterem:     # 改进的强调
      smart_enable: all
  - pymdownx.caret         # 插入符号
  - pymdownx.details       # 详情折叠
  - pymdownx.highlight:    # 代码高亮
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite  # 行内代码高亮
  - pymdownx.keys          # 键盘按键
  - pymdownx.mark          # 标记
  - pymdownx.smartsymbols  # 智能符号
  - pymdownx.snippets      # 代码片段
  - pymdownx.superfences:  # 代码围栏
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:       # 标签页
      alternate_style: true
  - pymdownx.tasklist:     # 任务列表
      custom_checkbox: true
  - pymdownx.tilde         # 删除线

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang:
        - en
        - zh
  # - social:
      # enabled: true
      # cards: true
      # cards_layout_options:
      #   color: "#7c3aed"
      #   font_family: "Arial"
      #   font_variant: "regular"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fomalhaut-m
      name: GitHub
    - icon: fontawesome/brands/git-alt
      link: https://gitee.com/Fomalhaut_luke
      name: Gitee
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/32121230
      name: Bilibili

