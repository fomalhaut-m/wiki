site_name: Luke's Wiki
theme:
  name: dracula
  language: zh

strict: false

docs_dir: ./docs

site_dir: ./site

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.mark
  - tables
  - toc:
      permalink: true
  - meta
  - def_list

nav:
  - 索引: index.md