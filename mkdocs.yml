site_name: Luke's Wiki
site_description: 个人知识沉淀与技术笔记
site_url: https://wiki.vexrune.top

theme:
  favicon: assets/favicon.svg
  name: material
  language: zh
  header:
    title: VexRune Wiki
  logo: assets/favicon.svg
  site_title: wiki.vexrune.top
  features:
    # 导航功能
    - navigation.tabs           # 顶部标签页
    - navigation.tabs.sticky    # 固定标签页
    - navigation.sections       # 导航分组
    - navigation.expand         # 展开所有导航
    - navigation.top            # 回到顶部按钮
    - navigation.instant        # 即时加载页面
    - navigation.tracking       # 地址栏追踪锚点
    - navigation.indexes        # 分组主页
    # 搜索功能
    - search.highlight          # 搜索高亮
    - search.share              # 搜索分享
    - search.suggest           # 搜索建议
    # 内容功能
    - content.tabs.link         # 内容标签页链接
    - content.code.copy         # 代码复制按钮
    - content.code.annotate     # 代码注释
    - content.action.edit       # 编辑此页
    - content.action.view       # 查看源码
    # 头部功能
    - header.autohide           # 滚动时自动隐藏头部
    # 表格功能
    - content.table             # 表格排序
    - toc.integrate            # 可选：目录整合

  palette:
    # 深色模式 - 黑灰色调
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: white
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    favicon: assets/favicon.svg

strict: false

docs_dir: ./docs

site_dir: ./site

markdown_extensions:
  # 基础扩展
  - abbr                    # 缩写
  - admonition             # 警告框
  - attr_list              # 属性列表
  - def_list               # 定义列表
  - footnotes              # 脚注
  - md_in_html             # HTML中的Markdown
  - tables                 # 表格
  - toc:
      permalink: true
      toc_depth: 3
  - meta                   # 元数据

  # PyMdown 扩展
  - pymdownx.betterem:     # 改进的强调
      smart_enable: all
  - pymdownx.caret         # 插入符号
  - pymdownx.details       # 详情折叠
  - pymdownx.highlight:    # 代码高亮
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite  # 行内代码高亮
  - pymdownx.keys          # 键盘按键
  - pymdownx.mark          # 标记
  - pymdownx.smartsymbols  # 智能符号
  - pymdownx.snippets      # 代码片段
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
      lang:
        - en
        - zh
  - mkdocs-nav-weight:
      # 当为true时，章节名称将使用其页面的title，而不是文件夹名称。例如，你可能有一个名为 的文件夹，但想让该部分的名称为 。设置该参数以实现这种行为。
      section_renamed: true
      # 用于index.md页面的weight值，以确保它始终在文件夹中排在首位。文件夹中的所有其他页面都应具有大于此值的weight值（以便它们在index.md页面之后列出）。
      index_weight: -10
      # 控制当在 Markdown 元数据中检测到无效值时是否发送Warning警告。
      warning: true
      # 默认情况下，页面按权重值从低到高排序。将此值设置为true将按从高到低的顺序排序。
      reverse: false
      # 一个选项，用于控制是否应将headless页面包含在nav.pages中，该属性供一些插件使用，例如：mkdocs-pdf-export-plugin。
      headless_included: false
      # 默认页面权重值，用于未指定权重值的页面。
      default_page_weight: 0

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fomalhaut-m
      name: GitHub
    - icon: fontawesome/brands/git-alt
      link: https://gitee.com/Fomalhaut_luke
      name: Gitee
    - icon: fontawesome/brands/bilibili
      link: https://space.bilibili.com/32121230
      name: Bilibili

